<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150" width="100%" height="100%">
  <style>
    .z { 
      font-family: 'Inter', 'Cairo', system-ui, sans-serif; 
      font-weight: 800; 
      font-size: 72px; 
      fill: #4ADE80; 
    }
    .enith { 
      font-family: 'Inter', 'Cairo', system-ui, sans-serif; 
      font-weight: 800; 
      font-size: 72px; 
      fill: #F4F7F5; 
    }
  </style>
  <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" letter-spacing="-2.5">
    <tspan class="z">Z</tspan><tspan class="enith">enith</tspan>
  </text>
</svg>

name: CI — Zenith Life OS

on:
  push:
    branches: [main, develop, "repair/*"]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint -- --max-warnings 0

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      # ── Security & Architecture Gates ────────────────────────────────────
      - name: "Gate: No eval/Function in formula engine"
        run: pnpm tsx scripts/check-no-eval.ts

      - name: "Gate: No UUID columns in migrations"
        run: pnpm tsx scripts/check-no-uuid-columns.ts

      - name: "Gate: Migration integrity"
        run: pnpm tsx scripts/check-migrations.ts

      - name: "Gate: RLS enforcement"
        run: pnpm tsx scripts/check-rls.ts

      - name: "Gate: Naming conventions"
        run: pnpm tsx scripts/check-naming.ts

      - name: "Gate: No direct AI provider imports"
        run: pnpm tsx scripts/check-no-ai-direct-import.ts

      - name: "Gate: No vault plaintext leak"
        run: pnpm tsx scripts/check-no-vault-leak.ts

      - name: "Gate: No localStorage secrets"
        run: pnpm tsx scripts/check-no-localstorage-secrets.ts

name: CI

on:
  push:
    branches: [main, develop, 'repair/**']
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint --max-warnings 0
      - run: pnpm test
      - run: pnpm build

      # Security gates
      - run: pnpm tsx scripts/check-migrations.ts
      - run: pnpm tsx scripts/check-rls.ts
      - run: pnpm tsx scripts/check-naming.ts
      - run: pnpm tsx scripts/check-no-ai-direct-import.ts
      - run: pnpm tsx scripts/check-no-vault-leak.ts
      - run: pnpm tsx scripts/check-no-localstorage-secrets.ts
      - run: pnpm tsx scripts/check-no-eval.ts
      - run: pnpm tsx scripts/check-no-uuid-columns.ts


name: CI — Wave 04 Gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ───────────────────────────────────────────────
  # 1. TypeCheck + Lint + Format
  # ───────────────────────────────────────────────
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: TypeCheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

  # ───────────────────────────────────────────────
  # 2. Unit Tests
  # ───────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm run test:unit

  # ───────────────────────────────────────────────
  # 3. Build
  # ───────────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [quality]
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ───────────────────────────────────────────────
  # 4. a11y + Lighthouse (STUB — deferred to W05)
  # ───────────────────────────────────────────────
  # TODO W05: Add axe-core CI gate
  # TODO W05: Add Lighthouse CI (Performance ≥90, A11y ≥95)
  # TODO W05: Add bundle-size gate (<200KB gzip)
  # TODO W05: Add visual regression diff
